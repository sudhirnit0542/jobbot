services:
  - type: web
    name: jobbot-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install-deps chromium
    startCommand: playwright install chromium && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/.playwright
